services:
  - type: web
    name: stackflow
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DATABASE_URL
        fromDatabase:
          name: stackflow-db
          property: connectionString

databases:
  - name: stackflow-db
    plan: free
    databaseName: stackflow
