<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StackFlow - Visualisasi Stack Interaktif</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>StackFlow</h1>
            <p>Visualisasi Stack (TUMPUKAN) Interaktif</p>
        </header>

        <main>
            <div class="main-grid">
                <div class="left-column">
                    <section class="controls">
                        <h2>Operasi</h2>
                        <div class="control-group">
                            <label for="pushValue">Nilai Push:</label>
                            <div class="input-group">
                                <input type="text" id="pushValue" placeholder="Masukkan nilai...">
                                <button id="pushBtn" class="btn btn-primary">Push</button>
                            </div>
                        </div>
                        <div class="control-group">
                            <button id="popBtn" class="btn btn-danger">Pop</button>
                            <button id="peekBtn" class="btn btn-secondary">Peek</button>
                        </div>
                        <div class="control-group">
                            <div class="status" id="status">Siap</div>
                        </div>
                    </section>

                    <section class="history">
                        <h2>Riwayat Operasi</h2>
                        <div class="terminal-container">
                            <div class="terminal-header">
                                <span class="dot"></span>
                                <span class="dot"></span>
                                <span class="dot"></span>
                                <button id="clearHistoryBtn" class="btn-clear" title="Hapus Riwayat">&#10005;</button>
                            </div>
                            <div class="terminal-content" id="historyDisplay">
                                <div class="history-list" id="historyList"></div>
                            </div>
                        </div>
                    </section>
                </div>

                <section class="stack-visualization">
                    <h2>Stack Saat Ini</h2>
                    <div class="terminal-container">
                        <div class="terminal-header">
                            <span class="dot"></span>
                            <span class="dot"></span>
                            <span class="dot"></span>
                        </div>
                        <div class="terminal-content" id="stackDisplay">
                            <div class="stack-viewport">
                                <div class="stack-container" id="stackContainer"></div>
                            </div>
                        </div>
                        <div class="terminal-footer">
                            <span id="stackInfo">Ukuran: 0 | Atas: null</span>
                        </div>
                    </div>
                </section>
            </div>
        </main>

        <footer>
            <p>StackFlow - Visualisasi Stack (TUMPUKAN)</p>
        </footer>
    </div>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
